<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  .ad{position:relative;width:300px;height:250px;background:#0D0B1E;overflow:hidden;
      font-family:Poppins,'Segoe UI',sans-serif;color:#F4F2FF;box-sizing:border-box;padding:22px}
  .c1{position:absolute;right:-60px;top:-70px;width:150px;height:150px;border-radius:50%;background:#2A2150}
  .c2{position:absolute;right:-40px;top:30px;width:100px;height:100px;border-radius:50%;background:#22D3EE;opacity:.9}
  .wordmark{position:relative;font-weight:700;font-size:17px;z-index:2}
  .wordmark b{color:#A78BFA}
  h1{position:relative;font-size:34px;line-height:1.12;font-weight:600;margin:16px 0 8px;z-index:2}
  .body{position:relative;color:#B9B3D9;font-size:14px;margin:0 0 16px;z-index:2}
  .cta{position:relative;display:inline-block;background:#A78BFA;color:#14102B;font-weight:600;
       font-size:15px;padding:12px 24px;border-radius:22px;z-index:2;
       transition:transform .15s ease,box-shadow .15s ease,background .15s ease}
  a:hover .cta{transform:translateY(-2px);background:#B9A4FB;box-shadow:0 6px 20px rgba(167,139,250,.45)}
  @keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .c1{animation:drift 9s ease-in-out infinite}
  .c2{animation:drift 11s ease-in-out infinite reverse}
</style></head><body>
<a href="https://play.boarderless.app" target="_blank" style="text-decoration:none;color:inherit;display:block;width:300px">
<div class="ad">
  <div class="c1"></div><div class="c2"></div>
  <div class="wordmark"><b>B</b>oarderless<span style="color:#B9B3D9;font-weight:500">.app</span></div>
  <h1>Build on the canvas.</h1>
  <p class="body">MCP for Claude, Cursor &amp; Windsurf.</p>
  <div class="cta">CONNECT →</div>
</div>
</a>
</body></html>
