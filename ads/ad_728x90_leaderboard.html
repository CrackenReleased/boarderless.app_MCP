<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  .ad{position:relative;width:728px;height:90px;background:#0D0B1E;overflow:hidden;
      font-family:Poppins,'Segoe UI',sans-serif;color:#F4F2FF;display:flex;align-items:center;
      box-sizing:border-box;padding:0 20px;gap:18px}
  .c1{position:absolute;left:-45px;top:-45px;width:100px;height:100px;border-radius:50%;background:#2A2150}
  .c2{position:absolute;left:-30px;bottom:-50px;width:85px;height:85px;border-radius:50%;background:#22D3EE;opacity:.55}
  .wordmark{position:relative;font-weight:700;font-size:18px;z-index:2;white-space:nowrap}
  .wordmark b{color:#A78BFA}
  .mid{position:relative;z-index:2;flex:1;min-width:0;overflow:hidden}
  .mid h1{font-size:19px;font-weight:600;margin:0;line-height:1.2;white-space:nowrap}
  .mid p{color:#B9B3D9;font-size:12px;margin:3px 0 0;white-space:nowrap}
  .cta{position:relative;z-index:2;flex:none;background:#A78BFA;color:#14102B;font-weight:600;
       font-size:14px;padding:12px 22px;border-radius:22px;white-space:nowrap;
       transition:transform .15s ease,box-shadow .15s ease,background .15s ease}
  a:hover .cta{transform:translateY(-2px);background:#B9A4FB;box-shadow:0 6px 20px rgba(167,139,250,.45)}
  @keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .c1{animation:drift 9s ease-in-out infinite}
  .c2{animation:drift 11s ease-in-out infinite reverse}
</style></head><body>
<a href="https://play.boarderless.app" target="_blank" style="text-decoration:none;color:inherit;display:block;width:728px">
<div class="ad">
  <div class="c1"></div><div class="c2"></div>
  <div class="wordmark"><b>B</b>oarderless</div>
  <div class="mid">
    <h1>Don't just chat. Build on the canvas.</h1>
    <p>MCP for Claude, Cursor &amp; Windsurf · typed spatial ledger</p>
  </div>
  <div class="cta">CONNECT →</div>
</div>
</a>
</body></html>
